<!-- @dsCard group="Colors" viewport="700x180" name="Brand — Navy & Amber" subtitle="Deep navy base + warm amber accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-ui); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="meta"><div class="name">Navy 900 · base</div><div class="hex">#0f2034</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="meta"><div class="name">Navy 800</div><div class="hex">#14263d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><div class="meta"><div class="name">Navy 600</div><div class="hex">#2a4870</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-500)"></div><div class="meta"><div class="name">Amber 500 · accent</div><div class="hex">#c18a3d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-300)"></div><div class="meta"><div class="name">Amber 300</div><div class="hex">#e4c08f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--amber-50)"></div><div class="meta"><div class="name">Amber 50 · soft</div><div class="hex">#faf4e9</div></div></div>
  </div>
</body>
</html>

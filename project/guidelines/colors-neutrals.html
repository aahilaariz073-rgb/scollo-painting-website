<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — Warm stone" subtitle="Warm-tinted grays, not cold gray" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-ui); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 96px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 56px; }
  .meta { padding: 7px 8px; }
  .name { font-size: 11px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="meta"><div class="name">Paper</div><div class="hex">#faf8f4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cloud)"></div><div class="meta"><div class="name">Cloud</div><div class="hex">#f3efe8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-200)"></div><div class="meta"><div class="name">Stone 200</div><div class="hex">#e6e0d6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-400)"></div><div class="meta"><div class="name">Stone 400</div><div class="hex">#a9a193</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--stone-600)"></div><div class="meta"><div class="name">Stone 600</div><div class="hex">#574f44</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name" style="color:#fff">Ink</div><div class="hex">#1b1814</div></div></div>
  </div>
</body>
</html>

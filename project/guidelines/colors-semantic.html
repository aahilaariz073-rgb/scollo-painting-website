<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Status colors — used sparingly" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-ui); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { display: flex; align-items: center; gap: 10px; }
  .dot { width: 36px; height: 36px; border-radius: var(--radius-sm); }
  .name { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="dot" style="background:var(--success)"></div><div><div class="name">Success</div><div class="hex">#2f7d52</div></div></div>
    <div class="sw"><div class="dot" style="background:var(--warning)"></div><div><div class="name">Warning</div><div class="hex">#c98a1e</div></div></div>
    <div class="sw"><div class="dot" style="background:var(--danger)"></div><div><div class="name">Danger</div><div class="hex">#b23b2e</div></div></div>
    <div class="sw"><div class="dot" style="background:var(--info)"></div><div><div class="name">Info</div><div class="hex">#2b6daf</div></div></div>
  </div>
</body>
</html>

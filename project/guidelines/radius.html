<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Restrained — 2 to 22px + pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-ui); }
  .row { display: flex; gap: 18px; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 72px; height: 56px; background: var(--navy-800); border: 2px solid var(--amber-500); }
  .lab { font-size: 11px; font-weight: 700; color: var(--text-strong); margin-top: 8px; }
  .px { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md · cards</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · panels</div><div class="px">14px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab">xl</div><div class="px">22px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lab">pill · tags</div><div class="px">999px</div></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); font-family: var(--font-ui); }
  .row { display: flex; gap: 28px; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 110px; height: 70px; background: var(--surface-card); border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .lab { font-size: 11px; font-weight: 700; color: var(--text-strong); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm · card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md · hover</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg · modal</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-accent);border-color:var(--amber-400)"></div><div class="lab">accent</div></div>
  </div>
</body>
</html>

<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base · 1–10 steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-ui); }
  .row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
  .item { text-align: center; }
  .bar { background: var(--amber-300); border-radius: var(--radius-xs); margin: 0 auto 8px; }
  .lab { font-size: 11px; font-weight: 700; color: var(--text-strong); }
  .px { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:16px"></div><div class="lab">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:24px"></div><div class="lab">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:32px"></div><div class="lab">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:40px"></div><div class="lab">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="width:24px;height:52px"></div><div class="lab">5</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="width:32px;height:64px"></div><div class="lab">6</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="width:48px;height:80px"></div><div class="lab">7</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="width:64px;height:96px"></div><div class="lab">8</div><div class="px">64</div></div>
  </div>
</body>
</html>

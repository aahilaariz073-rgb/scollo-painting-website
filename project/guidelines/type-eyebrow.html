<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & accent" subtitle="Uppercase overline + italic accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,600;1,6..72,400&family=Hanken+Grotesk:wght@600&display=swap">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .eyebrow { font-family: var(--font-ui); font-size: 12.5px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-accent); }
  .head { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--text-strong); margin-top: 10px; letter-spacing: -0.02em; }
  .it { font-style: italic; font-weight: 400; color: var(--text-accent); }
</style>
</head>
<body>
  <div class="eyebrow">Professional painters · Stuart, FL</div>
  <div class="head">Done right, <span class="it">once.</span></div>
</body>
</html>
